<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>菲利包装培训系统 | Fonli Training</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    .auth-footer { text-align:center; margin-top:1.5rem; font-size:.78rem; color:var(--dark-gray); }
    .loading-screen {
      position:fixed; inset:0; background:linear-gradient(135deg,var(--dark-blue) 0%,var(--mid-blue) 100%);
      display:flex; align-items:center; justify-content:center; z-index:9999; flex-direction:column; gap:1rem;
    }
    .loading-screen .spinner { border-color:rgba(255,255,255,.3); border-top-color:#fff; width:44px; height:44px; }
    .loading-screen p { color:#fff; font-size:.9rem; opacity:.8; }
    .loading-screen.hidden { display:none; }
    .error-msg { color:var(--danger); font-size:.82rem; margin-top:.3rem; display:none; }
    .error-msg.show { display:block; }
    #loginBtn.loading { opacity:.7; pointer-events:none; }
  </style>
</head>
<body>

<!-- Loading overlay -->
<div class="loading-screen" id="loadingScreen">
  <div class="spinner"></div>
  <p data-zh="正在连接..." data-en="Connecting...">正在连接...</p>
</div>

<!-- Auth Page -->
<div class="auth-page">
  <div class="auth-card">
    <div class="auth-logo">
      <div class="logo-mark" id="authLogoMark" style="background:transparent;">
        <img src="LOGO.png" alt="菲利包装" onerror="this.parentElement.style.background='var(--dark-blue)';this.outerHTML='<span>FL</span>'" style="width:64px;height:64px;border-radius:14px;object-fit:contain;">
      </div>
      <h1 data-zh="菲利包装" data-en="Fonli Packaging">菲利包装</h1>
      <p data-zh="销售培训与考核系统" data-en="Sales Training & Assessment System">销售培训与考核系统</p>
    </div>

    <h2 data-zh="员工登录" data-en="Staff Login">员工登录</h2>

    <div class="form-group">
      <label class="form-label" for="email" data-zh="邮箱地址" data-en="Email Address">邮箱地址</label>
      <input class="form-input" type="email" id="email" placeholder="请输入工作邮箱" autocomplete="username">
    </div>
    <div class="form-group">
      <label class="form-label" for="password" data-zh="密码" data-en="Password">密码</label>
      <input class="form-input" type="password" id="password" placeholder="请输入密码" autocomplete="current-password">
      <div class="error-msg" id="loginError"></div>
    </div>

    <button class="btn btn-primary btn-block btn-lg" id="loginBtn" onclick="doLogin()">
      <span data-zh="登录" data-en="Sign In">登录</span>
    </button>

    <div class="auth-footer">
      <p data-zh="账号由管理员创建，如需帮助请联系HR" data-en="Accounts are created by admin. Contact HR for assistance.">
        账号由管理员创建，如需帮助请联系HR
      </p>
    </div>

    <!-- Language switch -->
    <div style="text-align:center;margin-top:1.25rem;">
      <button class="lang-btn" style="background:var(--mid-gray);color:var(--dark-gray);" onclick="toggleLangLogin()">
        <span id="langBtnText">English</span>
      </button>
    </div>
  </div>
</div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
<script src="js/config.js"></script>
<script src="js/utils.js"></script>
<!-- data.js not needed on login page -->
<script>
  // Init Firebase
  firebase.initializeApp(FIREBASE_CONFIG);
  const auth = firebase.auth();
  const db   = firebase.firestore();

  // Check if already logged in
  auth.onAuthStateChanged(async user => {
    if (user) {
      // Get role and redirect
      const doc = await db.collection('users').doc(user.uid).get();
      if (doc.exists) {
        const role = doc.data().role;
        window.location.href = role === 'admin' ? 'admin.html' : 'app.html';
      } else {
        document.getElementById('loadingScreen').classList.add('hidden');
      }
    } else {
      document.getElementById('loadingScreen').classList.add('hidden');
    }
  });

  async function doLogin() {
    const email    = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;
    const errEl    = document.getElementById('loginError');
    const btn      = document.getElementById('loginBtn');

    errEl.classList.remove('show');
    if (!email || !password) {
      errEl.textContent = t('请填写邮箱和密码', 'Please enter email and password');
      errEl.classList.add('show'); return;
    }

    btn.classList.add('loading');
    btn.querySelector('span').textContent = t('登录中...', 'Signing in...');

    try {
      await auth.signInWithEmailAndPassword(email, password);
      // onAuthStateChanged will redirect
    } catch(e) {
      btn.classList.remove('loading');
      btn.querySelector('span').textContent = t('登录', 'Sign In');
      const msgs = {
        'auth/user-not-found':  t('账号不存在', 'Account not found'),
        'auth/wrong-password':  t('密码错误', 'Incorrect password'),
        'auth/invalid-email':   t('邮箱格式不正确', 'Invalid email format'),
        'auth/too-many-requests': t('尝试次数过多，请稍后再试', 'Too many attempts. Please try later.')
      };
      errEl.textContent = msgs[e.code] || t('登录失败，请重试', 'Login failed. Please try again.');
      errEl.classList.add('show');
    }
  }

  // Allow Enter key
  document.addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });

  function toggleLangLogin() {
    const newLang = getLang() === 'zh' ? 'en' : 'zh';
    setLang(newLang);
    document.getElementById('langBtnText').textContent = newLang === 'zh' ? 'English' : '中文';
    document.getElementById('email').placeholder      = t('请输入工作邮箱', 'Enter your work email');
    document.getElementById('password').placeholder   = t('请输入密码', 'Enter your password');
  }

  // Apply saved lang on load
  if (currentLang === 'en') {
    applyI18n();
    document.getElementById('langBtnText').textContent = '中文';
  }
</script>
</body>
</html>
